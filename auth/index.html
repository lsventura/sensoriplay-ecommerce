<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Entrar | Sensori Play</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Substitua pelo seu client ID do Google -->
    <meta name="google-signin-client_id" content="SEU_CLIENT_ID_DO_GOOGLE.apps.googleusercontent.com">
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 0; background:#fafafa; color:#2c3e50; }
        header { background:#ff6b9d; color:#fff; padding:1.5rem 2rem; display:flex; justify-content:space-between; align-items:center; }
        header a { color:#fff; text-decoration:none; font-size:0.9rem; }
        main { max-width:900px; margin:2rem auto; background:#fff; padding:2rem; border-radius:12px; box-shadow:0 4px 16px rgba(0,0,0,0.08); }
        h1 { margin-top:0; }
        .tabs { display:flex; gap:1rem; margin-bottom:1rem; }
        .tab-btn { border:none; background:#ecf0f1; padding:0.4rem 0.9rem; border-radius:999px; cursor:pointer; font-size:0.9rem; }
        .tab-btn.active { background:#ff6b9d; color:#fff; }
        form { display:grid; gap:0.8rem; max-width:380px; }
        label { font-size:0.9rem; font-weight:600; }
        input { width:100%; padding:0.5rem 0.6rem; border-radius:6px; border:1px solid #d0d0d0; font-size:0.95rem; }
        button[type="submit"] { margin-top:0.6rem; padding:0.6rem 1.4rem; border-radius:999px; border:none; background:#ff6b9d; color:#fff; font-weight:600; cursor:pointer; }
        #status { margin-top:0.8rem; font-size:0.9rem; }
        .google-btn { margin-top:1rem; padding:0.6rem 1.4rem; border-radius:999px; border:1px solid #d0d0d0; background:#fff; cursor:pointer; display:inline-flex; align-items:center; gap:0.5rem; font-size:0.9rem; }
    </style>
</head>
<body>
<header>
    <h1>Conta Sensori Play</h1>
    <a href="../index.html">← Voltar para a loja</a>
</header>
<main>
    <div class="tabs">
        <button class="tab-btn active" id="loginTab" onclick="showTab('login')">Entrar</button>
        <button class="tab-btn" id="registerTab" onclick="showTab('register')">Criar conta</button>
    </div>

    <section id="loginSection">
        <form id="loginForm">
            <div>
                <label for="loginEmail">E-mail</label>
                <input id="loginEmail" type="email" required>
            </div>
            <div>
                <label for="loginPassword">Senha</label>
                <input id="loginPassword" type="password" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
    </section>

    <section id="registerSection" style="display:none;">
        <form id="registerForm">
            <div>
                <label for="regName">Nome</label>
                <input id="regName" required>
            </div>
            <div>
                <label for="regEmail">E-mail</label>
                <input id="regEmail" type="email" required>
            </div>
            <div>
                <label for="regPassword">Senha</label>
                <input id="regPassword" type="password" required>
            </div>
            <button type="submit">Criar conta</button>
        </form>
    </section>

    <button class="google-btn" onclick="googleLoginPlaceholder()">Continuar com Google</button>
    <p style="font-size:0.8rem;color:#7f8c8d;">Dica: em produção, substitua pelo botão oficial do Google Identity e envie o ID token para <code>/auth/google</code>.</p>

    <p id="status"></p>
</main>

<script>
    const API_BASE = 'http://127.0.0.1:8000';

    function showTab(tab) {
        document.getElementById('loginSection').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerSection').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('loginTab').classList.toggle('active', tab === 'login');
        document.getElementById('registerTab').classList.toggle('active', tab === 'register');
        setStatus('', '');
    }

    function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.style.color = type === 'error' ? '#e74c3c' : '#27ae60';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new URLSearchParams();
        formData.append('username', document.getElementById('loginEmail').value);
        formData.append('password', document.getElementById('loginPassword').value);

        try {
            const resp = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString(),
            });
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.detail || 'Falha ao entrar');
            localStorage.setItem('sensori_token', data.access_token);
            setStatus('Login realizado com sucesso. Redirecionando...', 'ok');
            setTimeout(() => {
                window.location.href = '../admin/produtos.html';
            }, 800);
        } catch (err) {
            console.error(err);
            setStatus(err.message, 'error');
        }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPassword').value,
        };
        try {
            const resp = await fetch(`${API_BASE}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.detail || 'Falha ao criar conta');
            setStatus('Conta criada. Agora você pode entrar.', 'ok');
            showTab('login');
        } catch (err) {
            console.error(err);
            setStatus(err.message, 'error');
        }
    });

    function googleLoginPlaceholder() {
        alert('Para usar Google Login: obtenha um Client ID no Google Cloud, use o botão oficial e envie o ID token para /auth/google.');
    }
</script>
</body>
</html>
