<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato | Sensori Play</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #fafafa; color: #2c3e50; }
        header { background: #ff6b9d; color: #fff; padding: 1.5rem 2rem; }
        header h1 { margin: 0; font-size: 1.5rem; }
        header a { color: #fff; text-decoration: none; font-size: 0.9rem; }
        main { max-width: 900px; margin: 2rem auto; background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
        label { display:block; margin-top: 1rem; font-weight: 600; }
        input, textarea { width: 100%; padding: 0.5rem; border-radius: 6px; border: 1px solid #d0d0d0; margin-top: 0.25rem; }
        textarea { resize: vertical; min-height: 120px; }
        button { margin-top: 1rem; padding: 0.6rem 1.4rem; border-radius: 999px; border:none; background: #ff6b9d; color:#fff; font-weight:600; cursor:pointer; }
        p { line-height: 1.6; }
    </style>
</head>
<body>
<header>
    <div style="display:flex;justify-content:space-between;align-items:center;">
        <h1>Contato</h1>
        <a href="../index.html">← Voltar para a loja</a>
    </div>
</header>
<main>
    <p>Tem alguma dúvida, sugestão ou quer um projeto personalizado? Fale com a gente.</p>
    <p><strong>E-mail:</strong> contato@sensoriplay.com.br<br>
       <strong>WhatsApp:</strong> (11) 99999-9999</p>
    <form onsubmit="event.preventDefault(); alert('Formulário ilustrativo. Em produção, integrar com backend ou serviço de e-mail.');">
        <label for="nome">Nome</label>
        <input id="nome" required>
        <label for="email">E-mail</label>
        <input id="email" type="email" required>
        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" required></textarea>
        <button type="submit">Enviar</button>
    </form>
</main>
</body>
</html>
